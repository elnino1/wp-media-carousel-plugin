name: Build and Release

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Package Plugin
        run: bash package.sh

      - name: Get Version
        id: version
        run: |
          VERSION=$(grep -i "^ \* Version:" wp-media-carousel.php | awk -F':' '{print $2}' | xargs | tr -d '\r')
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from wp-media-carousel.php" >&2
            exit 1
          fi
          echo "zip=wp-media-carousel-${VERSION}.zip" >> $GITHUB_OUTPUT

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.version.outputs.zip }}
